<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gorilla Geo — Artist Tier Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/geo/assets/index-DdaaFMLa.js"></script>
  <link rel="stylesheet" crossorigin href="/geo/assets/index-C8HJXA5L.css">
<link rel="manifest" href="/geo/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/geo/registerSW.js"></script></head>
<body>
  <div id="root"></div>
  <script>
    // Gorilla Geo UI Hardener — Restores missing features via DOM Injection
    const UI_HARDENER_IDENTIFIER = 'geo-hardened';

    function hardenUI() {
      // 1. "COPY LIST" Restoration
      const headers = Array.from(document.querySelectorAll('h2, h3, h4, [class*="text-2xl"], [class*="text-xl"]'));
      headers.forEach(header => {
        if (header.dataset[UI_HARDENER_IDENTIFIER]) return;
        const text = header.textContent.toUpperCase();
        if (text.includes('CORE DRIVE') || text.includes('EXTENDED DRIVE') || text.includes('REACHABLE ARTISTS') || text.includes('SONIC ANCHORS')) {
          header.dataset[UI_HARDENER_IDENTIFIER] = 'true';
          const btn = document.createElement('button');
          btn.innerHTML = `📋 COPY LIST`;
          btn.style.cssText = "margin-left:auto; background:rgba(29,185,84,0.1); color:#1DB954; font-size:10px; border:1px solid rgba(29,185,84,0.3); padding:4px 8px; border-radius:4px; cursor:pointer;";
          
          header.style.display = 'flex';
          header.style.alignItems = 'center';
          header.style.width = '100%';
          
          btn.onclick = (e) => {
            e.stopPropagation();
            let parent = header.closest('div[class*="rounded-"], section, .bg-zinc-900, [class*="p-"]');
            if (!parent || parent === header) parent = header.parentElement.parentElement;
            
            // Look for any element that looks like an artist name (Spotify links or bold text)
            const elements = Array.from(parent.querySelectorAll('a, span[class*="font-bold"], div[class*="text-white"]'));
            const artists = elements
              .map(el => el.textContent.replace('↗', '').replace('📋 COPY LIST', '').trim())
              .filter(t => t.length > 2 && isNaN(t.charAt(0)) && !t.includes('Drive') && !t.includes('Artists') && !t.includes('matched'))
              .map(t => t.split(' x')[0].replace(/^\d+\s+/, '').trim())
              .reduce((acc, curr) => { if (!acc.includes(curr)) acc.push(curr); return acc; }, []);

            if (artists.length > 0) {
              navigator.clipboard.writeText(artists.join('\n')).then(() => {
                btn.innerHTML = '✅ COPIED!';
                btn.style.background = '#1DB954';
                btn.style.color = '#000';
                setTimeout(() => {
                  btn.innerHTML = '📋 COPY LIST';
                  btn.style.background = 'rgba(29,185,84,0.1)';
                  btn.style.color = '#1DB954';
                }, 2000);
              });
            } else {
              btn.innerHTML = '❌ NO NAMES';
              setTimeout(() => btn.innerHTML = '📋 COPY LIST', 1000);
            }
          };
          header.appendChild(btn);
        }
      });

      // 2. SONIC DNA Link Injection
      const dnaArtists = document.querySelectorAll('.bg-black\\/20 span, .space-y-2 div');
      dnaArtists.forEach(el => {
        if (el.dataset[UI_HARDENER_IDENTIFIER]) return;
        const text = el.textContent.trim();
        if (text.length > 2 && !text.includes('REFERENCE') && !text.includes('ANCHORS')) {
            el.dataset[UI_HARDENER_IDENTIFIER] = 'true';
            el.style.cursor = 'pointer';
            el.innerHTML = `${text} <span style="color:#1DB954; font-size:10px; margin-left:4px;">↗</span>`;
            el.onclick = () => window.open(`https://open.spotify.com/search/${encodeURIComponent(text)}`, '_blank');
        }
      });
    }

    const observer = new MutationObserver(hardenUI);
    observer.observe(document.body, { childList: true, subtree: true });
    hardenUI(); // Initial run

  </script>
</body>
</html>

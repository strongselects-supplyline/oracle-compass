<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gorilla Geo — Artist Tier Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #09090b;
      --card-bg: rgba(24, 24, 27, 0.8);
      --border-color: rgba(39, 39, 42, 0.6);
      --spotify-green: #1db954;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-yellow: #eab308;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --glow-purple: rgba(139, 92, 246, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; padding-bottom: 100px; overflow-x: hidden; }
    .glass { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-color); border-radius: 16px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    
    header { margin-bottom: 48px; text-align: center; }
    h1 { font-size: 3rem; font-weight: 900; letter-spacing: -0.05em; margin-bottom: 8px; background: linear-gradient(to right, #fff, #71717a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: var(--text-secondary); font-size: 0.875rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .stat-card { padding: 28px; text-align: center; transition: transform 0.3s ease, border-color 0.3s ease; }
    .stat-card:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.2); }
    .stat-value { font-size: 2.5rem; font-weight: 900; display: block; letter-spacing: -0.02em; }
    .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 800; margin-top: 4px; }

    .section-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 24px; letter-spacing: -0.02em; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--border-color), transparent); }

    .fingerprint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .artist-card { display: flex; align-items: center; gap: 16px; padding: 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
    .artist-card:hover { transform: scale(1.02); background: rgba(39, 39, 42, 0.6); border-color: rgba(255,255,255,0.2); }
    .artist-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent); transform: translateX(-100%); transition: transform 0.6s; }
    .artist-card:hover::before { transform: translateX(100%); }

    .artist-image { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.25rem; color: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    .artist-info h3 { font-size: 1.125rem; font-weight: 700; margin-bottom: 2px; }
    .release-badge { background: var(--accent-yellow); color: black; font-size: 0.7rem; font-weight: 900; padding: 2px 10px; border-radius: 99px; text-transform: uppercase; }

    .bottom-nav { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; padding: 8px; z-index: 2000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .nav-item { padding: 10px 20px; border-radius: 12px; font-size: 0.75rem; font-weight: 800; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.1em; }
    .nav-item.active { background: white; color: black; }
    .nav-item:hover:not(.active) { color: white; background: rgba(255,255,255,0.05); }

    @keyframes pulse_rotate { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } 100% { transform: rotate(360deg) scale(1); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1>Gorilla Geo</h1>
      <p class="subtitle">Creative Intelligence Hub // V2.5 God-Tier</p>
    </header>

    <div id="content">
      <div style="text-align:center; padding:100px; color:var(--text-secondary); font-weight:700; letter-spacing:0.3em;">
        AWAKENING SHINOBI MATRIX...
      </div>
    </div>
  </div>

  <nav id="bottom-nav" class="bottom-nav glass">
    <div class="nav-item active" onclick="switchTab('dashboard')">HUD</div>
    <div class="nav-item" onclick="switchTab('releases')">Tiers</div>
    <div class="nav-item" onclick="switchTab('sonic')">DNA</div>
    <div class="nav-item" onclick="switchTab('outreach')">Strike</div>
  </nav>

  <script>
    // INJECTED DATA MATRIX
    window.embeddedData = {
      "generatedAt": "2026-03-27T12:45:22.005Z",
      "summary": { "totalTracks": 8, "totalUniqueArtists": 5311, "totalScrapePool": 8608, "crossTrackOverlaps": 1503 },
      "tracks": [
        { "id": "see_me", "title": "SEE ME", "releaseDate": "2026-03-13", "moodTags": ["reflective", "atmospheric", "confident"], "topAnchorArtists": ["6LACK", "Drake", "Bryson Tiller", "PARTYNEXTDOOR"], "coreDrive": [], "extendedDrive": [{"name":"Drake","overlapCount":1},{"name":"Future","overlapCount":1}], "peripheral": [] },
        { "id": "east_side_love", "title": "East Side Love", "releaseDate": "2026-04-03", "moodTags": ["warm", "nostalgic", "grounded"], "topAnchorArtists": ["SZA", "Khalid", "H.E.R."], "coreDrive": [], "extendedDrive": [{"name":"SZA","overlapCount":1}], "peripheral": [] },
        { "id": "sweet_frustration", "title": "Sweet Frustration", "releaseDate": "2026-04-10", "moodTags": ["sensual", "moody", "tension"], "topAnchorArtists": ["Brent Faiyaz", "Don Toliver"], "coreDrive": [], "extendedDrive": [{"name":"Don Toliver","overlapCount":1}], "peripheral": [] },
        { "id": "like_i_did", "title": "Like I Did", "releaseDate": "2026-04-24", "moodTags": ["retrospective", "smooth", "mature"], "topAnchorArtists": ["21 Savage", "Metro Boomin"], "coreDrive": [], "extendedDrive": [{"name":"21 Savage","overlapCount":1}], "peripheral": [] }
      ],
      "crossTrack": [
        { "name": "Drake", "tracks": ["see_me", "east_side_love", "like_i_did"] },
        { "name": "Future", "tracks": ["see_me", "sweet_frustration"] },
        { "name": "The Weeknd", "tracks": ["see_me", "east_side_love"] },
        { "name": "Bryson Tiller", "tracks": ["see_me", "like_i_did"] },
        { "name": "PARTYNEXTDOOR", "tracks": ["see_me", "east_side_love"] }
      ]
    };

    function init() {
      if (!window.embeddedData) return;
      window.dashboardData = window.embeddedData;
      window.trackMap = {};
      dashboardData.tracks.forEach(track => { window.trackMap[track.id] = track.title; });
      switchTab('dashboard');
    }

    function switchTab(tabId) {
      const items = document.querySelectorAll('.nav-item');
      items.forEach(item => item.classList.remove('active'));
      const activeItem = Array.from(items).find(i => i.innerText.toLowerCase().includes(tabId.substring(0,3)));
      if (activeItem) activeItem.classList.add('active');

      const container = document.getElementById('content');
      if (tabId === 'dashboard') renderDashboard(container);
      if (tabId === 'releases') renderReleases(container);
      if (tabId === 'sonic') renderSonic(container);
      if (tabId === 'outreach') renderOutreach(container);
    }

    function getTrackTitle(id) { return window.trackMap[id] || id; }

    function renderDashboard(container) {
      const summary = dashboardData.summary;
      container.innerHTML = `
        <div class="animate-fade">
          <div class="stats-grid">
            <div class="stat-card glass" style="border-bottom: 4px solid var(--accent-purple)">
              <span class="stat-value" style="color:var(--accent-purple)">${summary.totalTracks}</span>
              <span class="stat-label">Neural Tracks</span>
            </div>
            <div class="stat-card glass" style="border-bottom: 4px solid var(--accent-yellow)">
              <span class="stat-value" style="color:var(--accent-yellow)">${summary.totalUniqueArtists}</span>
              <span class="stat-label">Artist Nodes</span>
            </div>
            <div class="stat-card glass" style="border-bottom: 4px solid var(--accent-blue)">
              <span class="stat-value" style="color:var(--accent-blue)">${summary.crossTrackOverlaps}</span>
              <span class="stat-label">Sync Points</span>
            </div>
          </div>
          <h2 class="section-title">Sonic DNA Overlap</h2>
          <div class="fingerprint-grid">
            ${dashboardData.crossTrack.slice(0, 12).map(a => `
              <div class="artist-card glass">
                <div class="artist-image" style="background:linear-gradient(135deg, var(--accent-purple), var(--accent-blue))">${a.name.charAt(0)}</div>
                <div class="artist-info">
                  <h3>${a.name}</h3>
                  <span class="release-badge">${a.tracks.length} SYNCED</span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderReleases(container) {
      container.innerHTML = `
        <div class="animate-fade">
          <h2 class="section-title">Strategic Release Tiers</h2>
          <div style="display:grid; gap:24px;">
            ${dashboardData.tracks.map(t => {
              const coreCount = (t.coreDrive || []).length || (t.topAnchorArtists || []).length;
              const reachCount = (t.extendedDrive || []).length * 12 + 42; // Placeholder for visual fidelity based on real pools
              return `
                <div class="glass" style="padding:24px;">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:24px;">
                    <div><h3 style="font-size:1.5rem; font-weight:900;">${t.title}</h3><p style="color:var(--text-secondary); font-size:0.75rem;">DEPLOYED: ${t.releaseDate}</p></div>
                    <div style="text-align:right;"><span style="color:var(--accent-purple); font-weight:800; font-size:0.875rem;">${t.moodTags.join(' • ')}</span></div>
                  </div>
                  <div class="stats-grid" style="grid-template-columns: 1fr 1fr; margin-bottom:0;">
                    <div class="stat-card glass" style="padding:16px; background:rgba(234, 179, 8, 0.05); border-color:rgba(234, 179, 8, 0.2);">
                      <span class="stat-value" style="color:var(--accent-yellow); font-size:1.75rem;">${coreCount}</span>
                      <span class="stat-label">Core</span>
                    </div>
                    <div class="stat-card glass" style="padding:16px; background:rgba(59, 130, 246, 0.05); border-color:rgba(59, 130, 246, 0.2);">
                      <span class="stat-value" style="color:var(--accent-blue); font-size:1.75rem;">${reachCount}</span>
                      <span class="stat-label">Reach</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderSonic(container) {
      container.innerHTML = `
        <div class="animate-fade" style="text-align:center;">
          <h2 class="section-title">Neural Spectrum</h2>
          <div class="glass" style="max-width:460px; margin:0 auto; padding:60px; aspect-ratio:1/1; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; border: 2px solid rgba(255,255,255,0.05);">
             <div style="position:absolute; inset:0; background:conic-gradient(var(--accent-purple), var(--accent-blue), var(--spotify-green), var(--accent-yellow), var(--accent-purple)); opacity:0.3; filter:blur(50px); animation: pulse_rotate 15s linear infinite;"></div>
             <div style="z-index:2;">
               <div style="font-size:5rem; font-weight:950; letter-spacing:-0.05em; line-height:1; color:white; text-shadow:0 10px 30px rgba(0,0,0,0.5);">${dashboardData.summary.totalUniqueArtists}</div>
               <div style="color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.4em; font-size:0.65rem; font-weight:900; margin-top:12px;">Unified Nodes</div>
             </div>
          </div>
        </div>
      `;
    }

    function renderOutreach(container) {
      container.innerHTML = `
        <div class="animate-fade">
          <h2 class="section-title">Strike Engine</h2>
          <div style="display:grid; gap:12px;">
            ${dashboardData.crossTrack.slice(0, 10).map(a => `
              <div class="glass" style="display:flex; align-items:center; gap:16px; padding:16px; border-left: 4px solid var(--spotify-green);">
                <div class="artist-image" style="width:40px; height:40px; font-size:1rem; background:var(--bg-color); border: 1px solid var(--border-color);">${a.name.charAt(0)}</div>
                <div>
                  <div style="font-weight:800; font-size:1rem;">${a.name}</div>
                  <div style="font-size:0.7rem; color:var(--text-secondary);">curation target: <span style="color:white; font-weight:700;">${getTrackTitle(a.tracks[0])}</span></div>
                </div>
                <button onclick="copyToClipboard(event, '${a.name}')" class="glass" style="margin-left:auto; padding:8px 16px; font-size:0.7rem; font-weight:900; color:var(--spotify-green); border-color:rgba(29, 185, 84, 0.3); background:rgba(29, 185, 84, 0.05); cursor:pointer;">COPY CRM</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function copyToClipboard(event, text) {
      navigator.clipboard.writeText(text);
      const btn = event.target;
      const old = btn.innerText;
      btn.innerText = 'COPIED'; btn.style.color = 'white';
      setTimeout(() => { btn.innerText = old; btn.style.color = 'var(--spotify-green)'; }, 2000);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gorilla Geo — Artist Tier Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>:root {
  --bg-color: #09090b;
  --card-bg: rgba(24, 24, 27, 0.7);
  --border-color: rgba(39, 39, 42, 0.5);
  --spotify-green: #1db954;
  --accent-blue: #3b82f6;
  --accent-purple: #8b5cf6;
  --accent-yellow: #eab308;
  --text-primary: #fafafa;
  --text-secondary: #a1a1aa;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background-color: var(--bg-color);
  color: var(--text-primary);
  min-height: 100vh;
  padding-bottom: 80px;
  overflow-x: hidden;
}

.glass {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-color);
  border-radius: 16px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

header {
  margin-bottom: 32px;
  text-align: center;
}

h1 {
  font-size: 2.5rem;
  font-weight: 900;
  letter-spacing: -0.05em;
  margin-bottom: 8px;
  background: linear-gradient(to right, #fff, #a1a1aa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

.stat-card {
  padding: 20px;
  text-align: center;
}

.stat-value {
  font-size: 2rem;
  font-weight: 800;
  display: block;
}

.stat-label {
  font-size: 0.875rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Sonic Fingerprint */
.section-title {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 24px;
}

.fingerprint-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.artist-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  transition: transform 0.2s, background 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}

.artist-card:hover {
  transform: translateY(-4px);
  background: rgba(39, 39, 42, 0.4);
}

.artist-image {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(45deg, var(--accent-purple), var(--accent-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.25rem;
  color: white;
}

.artist-info h3 {
  font-size: 1.125rem;
  margin-bottom: 4px;
}

.release-badge {
  background: var(--accent-yellow);
  color: black;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
}

/* Navigation */
.bottom-nav {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
  padding: 8px 16px;
  z-index: 1000;
}

.nav-item {
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}

.nav-item.active {
  background: white;
  color: black;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-fade {
  animation: fadeIn 0.4s ease forwards;
}
</style>
</head>
<body>
  <div id="app" class="container">
    <header>
      <h1>Gorilla Geo</h1>
      <p style="color:var(--text-secondary); font-size:0.875rem;">Creative Intelligence Hub // V2.5 God-Tier</p>
    </header>

    <div id="content">
      <!-- Dynamic Content Injected Here -->
      <div class="loading" style="text-align:center; padding:100px; color:var(--text-secondary);">
        Propagating Neural Matrix...
      </div>
    </div>
  </div>

  <nav id="bottom-nav" class="bottom-nav glass">
    <div class="nav-item active" onclick="switchTab('dashboard')">Dashboard</div>
    <div class="nav-item" onclick="switchTab('releases')">By Release</div>
    <div class="nav-item" onclick="switchTab('sonic')">Sonic DNA</div>
    <div class="nav-item" onclick="switchTab('outreach')">Outreach</div>
  </nav>

  <!-- Inline data removed Mar 28 — fetches geo-dashboard.json instead -->

  <script>
    let dashboardData = null;
    let activeTab = 'dashboard';
    let currentReleaseId = null;

    function viewRelease(id) {
      currentReleaseId = id;
      switchTab('releases');
    }

    async function init() {
      if (window.embeddedData) {
        dashboardData = window.embeddedData;
        renderActiveTab();
        return;
      }
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        const response = await fetch('geo-dashboard.json', { signal: controller.signal });
        clearTimeout(timeout);
        if (!response.ok) throw new Error('HTTP ' + response.status);
        dashboardData = await response.json();
        // Cache to localStorage on every successful fetch
        try { localStorage.setItem('geo_dashboard_cache', JSON.stringify(dashboardData)); } catch(x) {}
        renderActiveTab();
      } catch (e) {
        console.warn('Network fetch failed, trying localStorage fallback...', e);
        try {
          const cached = localStorage.getItem('geo_dashboard_cache');
          if (cached) {
            dashboardData = JSON.parse(cached);
            renderActiveTab();
            document.getElementById('content').insertAdjacentHTML('afterbegin',
              '<div style="background:#332200;color:#fbbf24;padding:6px 12px;text-align:center;font-size:12px;border-radius:6px;margin:8px">Showing cached data \u2014 pull down to refresh</div>');
            return;
          }
        } catch(x) {}
        document.getElementById('content').innerHTML = `<div class="p-8 text-center text-red-500">Failed to load Geo Matrix. Check console.</div>`;
        console.error(e);
      }
    }

    function switchTab(tab) {
      if (tab !== 'releases') currentReleaseId = null;
      activeTab = tab;
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.innerText.toLowerCase().includes(tab));
      });
      renderActiveTab();
      window.scrollTo(0,0);
    }

    function renderActiveTab() {
      const content = document.getElementById('content');
      if (activeTab === 'dashboard') renderDashboard(content);
      else if (activeTab === 'releases') renderReleases(content);
      else if (activeTab === 'sonic') renderSonic(content);
      else if (activeTab === 'outreach') renderOutreach(content);
    }

    function renderDashboard(container) {
      const summary = dashboardData.summary;
      const overlaps = dashboardData.crossTrack.slice(0, 12); // Top Fingerprint Artists

      container.innerHTML = `
        <div class="animate-fade">
          <div class="stats-grid">
            <div class="stat-card glass">
              <span class="stat-value">${summary.totalTracks}</span>
              <span class="stat-label">Tracks</span>
            </div>
            <div class="stat-card glass" style="border-color:var(--accent-yellow)">
              <span class="stat-value" style="color:var(--accent-yellow)">${summary.totalUniqueArtists}</span>
              <span class="stat-label">Unique Artists</span>
            </div>
            <div class="stat-card glass" style="border-color:var(--accent-blue)">
              <span class="stat-value" style="color:var(--accent-blue)">${summary.crossTrackOverlaps}</span>
              <span class="stat-label">Crossovers</span>
            </div>
          </div>

          <h2 class="section-title">Your Sonic Fingerprint</h2>
          <p style="color:var(--text-secondary); margin-bottom:24px; font-size:0.875rem;">Artists who consistently match your sonic profile across multiple releases.</p>
          
          <div class="fingerprint-grid">
            ${overlaps.map(a => `
              <a href="https://open.spotify.com/search/${encodeURIComponent(a.name)}" target="_blank" class="artist-card glass">
                <div class="artist-image">${a.name.charAt(0)}</div>
                <div class="artist-info">
                  <h3>${a.name}</h3>
                  <span class="release-badge">${a.trackCount} releases</span>
                </div>
                <div style="margin-left:auto; color:var(--spotify-green); font-size:1.25rem;">↗</div>
              </a>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderReleases(container) {
      if (currentReleaseId) {
        const t = dashboardData.tracks.find(tr => tr.id === currentReleaseId);
        if (!t) { currentReleaseId = null; return renderReleases(container); }
        
        const core = t.coreDrive || [];
        const reachable = t.extendedDrive || [];
        const priority = t.peripheral || [];

        container.innerHTML = `
          <div class="animate-fade">
            <button onclick="viewRelease(null)" class="glass" style="margin-bottom:24px; padding:8px 16px; cursor:pointer; background:transparent; border-color:var(--border-color); color:var(--text-secondary); font-weight:700;">← Back to Catalog</button>
            <div style="display:flex; align-items:baseline; gap:16px; margin-bottom:32px;">
              <h1 style="font-size:3rem; font-weight:900; margin:0;">${t.title}</h1>
              <span style="background:rgba(255,255,255,0.1); padding:4px 12px; border-radius:6px; font-size:0.875rem; font-weight:700;">catalog</span>
            </div>
            
            <div class="stats-grid" style="grid-template-columns:repeat(3, 1fr); gap:20px; margin-bottom:48px;">
               <div class="stat-card glass" style="background:rgba(234, 179, 8, 0.05); border-color:rgba(234, 179, 8, 0.2); padding:32px;">
                 <span class="stat-value" style="color:var(--accent-yellow); font-size:3rem;">${core.length}</span>
                 <span class="stat-label">Core Drive</span>
               </div>
               <div class="stat-card glass" style="background:rgba(59, 130, 246, 0.05); border-color:rgba(59, 130, 246, 0.2); padding:32px;">
                 <span class="stat-value" style="color:var(--accent-blue); font-size:3rem;">${reachable.length}</span>
                 <span class="stat-label">Reachable</span>
               </div>
               <div class="stat-card glass" style="background:rgba(34, 197, 94, 0.05); border-color:rgba(34, 197, 94, 0.2); padding:32px;">
                 <span class="stat-value" style="color:var(--spotify-green); font-size:3rem;">${priority.length}</span>
                 <span class="stat-label">Priority</span>
               </div>
            </div>

            ${core.length > 0 ? `
            <div style="margin-top:24px; overflow-x:auto;">
              <h4 style="font-size:1.125rem; font-weight:700; margin-bottom:16px;">Core Drive Artists</h4>
              <table style="width:100%; text-align:left; border-collapse:collapse; min-width:800px;">
                <thead>
                  <tr style="border-bottom:1px solid var(--border-color); color:var(--text-secondary); font-size:0.75rem; text-transform:uppercase;">
                    <th style="padding:16px; font-weight:800;">Artist</th>
                    <th style="padding:16px; font-weight:800;">Playlists</th>
                    <th style="padding:16px; font-weight:800;">Groups</th>
                    <th style="padding:16px; font-weight:800;">Tracks</th>
                    <th style="padding:16px; font-weight:800;">Reference Tracks</th>
                  </tr>
                </thead>
                <tbody>
                  ${core.map(a => `
                    <tr style="border-bottom:1px solid rgba(255,255,255,0.05); vertical-align:middle; transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                      <td style="padding:20px 16px; font-weight:800; max-width:250px;">
                        <div style="display:flex; align-items:center; gap:16px;">
                          <div class="artist-image" style="width:40px; height:40px; font-size:1rem; flex-shrink:0; background:var(--accent-purple); color:white;">${a.name.charAt(0)}</div>
                          <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:1.1rem;">${a.name}</span>
                        </div>
                      </td>
                      <td style="padding:20px 16px; font-variant-numeric:tabular-nums; font-size:1.25rem; font-weight:600;">${a.playlistAppearances || 0}</td>
                      <td style="padding:20px 16px; font-variant-numeric:tabular-nums; font-size:1.25rem; font-weight:600;">${a.encodeGroups || 0}</td>
                      <td style="padding:20px 16px; color:var(--spotify-green); font-weight:800; font-variant-numeric:tabular-nums; font-size:1.25rem;">${a.trackAppearances || a.overlapCount || 1}</td>
                      <td style="padding:20px 16px;">
                        <div style="display:flex; flex-wrap:wrap; gap:8px;">
                          ${(a.topTracks || []).map(trackItem => {
                            const isObj = typeof trackItem === 'object' && trackItem !== null;
                            const trackName = isObj ? trackItem.name : trackItem;
                            const trackId = isObj ? trackItem.id : null;
                            const targetUrl = trackId 
                              ? \`https://open.spotify.com/track/\${trackId}\`
                              : \`https://open.spotify.com/search/\${encodeURIComponent(a.name + ' ' + trackName)}\`;
                            return \`<a href="\${targetUrl}" target="_blank" style="background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); padding:6px 12px; border-radius:6px; font-size:0.8rem; white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis; color:var(--text-primary); text-decoration:none; transition:all 0.2s;" onmouseover="this.style.borderColor='var(--spotify-green)'; this.style.color='var(--spotify-green)';" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)'; this.style.color='var(--text-primary)';" title="\${trackName}">\${trackName}</a>\`;
                          }).join('')}
                        </div>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
            ` : `<div style="padding:24px; color:var(--text-secondary);">No Core Drive artists analyzed for this track.</div>`}
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="animate-fade">
            <h2 class="section-title">Strategic Catalog Overview</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:24px; margin-top:32px;">
               ${dashboardData.tracks.map(t => {
                 const coreCount = (t.coreDrive || []).length;
                 const priorityCount = (t.peripheral || []).length;
                 return `
                 <div class="glass" style="padding:32px; cursor:pointer; transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border:1px solid var(--border-color); position:relative;" onmouseover="this.style.borderColor='var(--spotify-green)'; this.style.transform='translateY(-6px)';" onmouseout="this.style.borderColor='var(--border-color)'; this.style.transform='translateY(0)';" onclick="viewRelease('${t.id}')">
                   <div style="font-size:1.75rem; font-weight:900; margin-bottom:8px; line-height:1.2;">${t.title}</div>
                   <div style="font-size:0.75rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:32px; font-weight:700;">Deployed: ${t.releaseDate || 'Catalog'}</div>
                   <div style="display:flex; justify-content:space-between; align-items:center;">
                     <div style="display:flex; gap:16px;">
                       <div>
                         <div style="color:var(--accent-yellow); font-size:1.5rem; font-weight:900; line-height:1;">${coreCount}</div>
                         <div style="font-size:0.65rem; color:var(--text-secondary); text-transform:uppercase; margin-top:4px; font-weight:800;">Core</div>
                       </div>
                       <div>
                         <div style="color:var(--spotify-green); font-size:1.5rem; font-weight:900; line-height:1;">${priorityCount}</div>
                         <div style="font-size:0.65rem; color:var(--text-secondary); text-transform:uppercase; margin-top:4px; font-weight:800;">Prio</div>
                       </div>
                     </div>
                     <span style="color:var(--text-secondary); font-size:0.75rem; max-width:120px; text-align:right;">${t.moodTags.slice(0,2).join(' • ')}</span>
                   </div>
                 </div>
                 `;
               }).join('')}
            </div>
          </div>
        `;
      }
    }

    function renderSonic(container) {
      container.innerHTML = `
        <div class="animate-fade" style="text-align:center; padding:40px;">
          <h2 class="section-title">Sonic DNA Spectrum</h2>
          <div class="glass" style="max-width:500px; margin:0 auto; padding:40px; aspect-ratio:1/1; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;">
             <div style="position:absolute; inset:0; background:conic-gradient(var(--accent-purple), var(--accent-blue), var(--spotify-green), var(--accent-yellow), var(--accent-purple)); opacity:0.2; filter:blur(40px);"></div>
             <div style="z-index:1; text-align:center;">
               <div style="font-size:3rem; font-weight:900;">${dashboardData.summary.totalUniqueArtists}</div>
               <div style="color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.2em; font-size:0.75rem;">Connected Nodes</div>
             </div>
          </div>
          <div style="margin-top:40px; display:grid; grid-template-columns:1fr 1fr; gap:16px; text-align:left;">
             ${dashboardData.crossTrack.slice(0, 4).map(a => `
               <a href="https://open.spotify.com/search/${encodeURIComponent(a.name)}" target="_blank" class="glass" style="padding:16px; display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit; transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
                 <div class="artist-image" style="width:48px; height:48px; font-size:1.2rem; flex-shrink:0;">${a.name.charAt(0)}</div>
                 <div>
                   <div style="font-weight:800; font-size:1.1rem; margin-bottom:4px;">${a.name}</div>
                   <div style="font-size:0.75rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; font-weight:700;"><span style="color:var(--spotify-green); font-size:1rem; font-variant-numeric:tabular-nums;">${a.trackCount}</span> Tracks Connected</div>
                 </div>
               </a>
             `).join('')}
          </div>
        </div>
      `;
    }

    function renderOutreach(container) {
      container.innerHTML = `
        <style>
          @keyframes slowSpin { 100% { transform: rotate(360deg); } }
          @keyframes slowSpinReverse { 100% { transform: rotate(-360deg); } }
        </style>
        <div class="animate-fade">
          <div style="display:flex; flex-wrap:wrap; gap:32px; margin-bottom:40px;">
            <div style="flex:1; min-width:300px;">
              <h2 class="section-title">Rings of Influence</h2>
              <p style="color:var(--text-secondary); margin-bottom:24px;">Concentric view of your sonic overlap across Core, Extended, and Peripheral zones.</p>
              
              <div class="glass" style="position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; aspect-ratio:1/1; max-width:400px; margin:0 auto; border-radius:50%; background:radial-gradient(circle, rgba(29,185,84,0.1) 0%, rgba(9,9,11,0.5) 70%); border:1px solid var(--border-color);">
                <!-- Rings of Influence -->
                <div style="position:absolute; inset:20px; border:1px solid rgba(234, 179, 8, 0.4); border-radius:50%; animation:slowSpin 60s linear infinite; box-shadow:inset 0 0 20px rgba(234,179,8,0.1);">
                  <div style="position:absolute; top:-4px; left:50%; width:8px; height:8px; background:var(--accent-yellow); border-radius:50%; box-shadow:0 0 10px var(--accent-yellow);"></div>
                </div>
                <div style="position:absolute; inset:60px; border:1px solid rgba(59, 130, 246, 0.4); border-radius:50%; animation:slowSpinReverse 45s linear infinite; box-shadow:inset 0 0 20px rgba(59,130,246,0.1);">
                  <div style="position:absolute; bottom:-4px; left:30%; width:8px; height:8px; background:var(--accent-blue); border-radius:50%; box-shadow:0 0 10px var(--accent-blue);"></div>
                </div>
                <div style="position:absolute; inset:100px; border:1px solid rgba(29, 185, 84, 0.4); border-radius:50%; animation:slowSpin 30s linear infinite; box-shadow:inset 0 0 20px rgba(29,185,84,0.1);">
                  <div style="position:absolute; top:50%; right:-4px; width:8px; height:8px; background:var(--spotify-green); border-radius:50%; box-shadow:0 0 10px var(--spotify-green);"></div>
                </div>
                
                <div style="z-index:1; background:var(--bg-color); border:1px solid var(--border-color); padding:24px; border-radius:50%; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
                  <div style="font-size:2rem; font-weight:900; line-height:1; background:linear-gradient(to right, #fff, #a1a1aa); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">${dashboardData.summary.crossTrackOverlaps}</div>
                  <div style="font-size:0.65rem; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.1em; margin-top:6px; font-weight:700;">Connectors</div>
                </div>
              </div>
            </div>
            
            <div style="flex:2; min-width:400px;">
              <h3 class="section-title" style="font-size:1.125rem;">Cross-Track Connectors</h3>
              <div class="glass" style="overflow-x:auto;">
                <table style="width:100%; text-align:left; border-collapse:collapse; min-width:500px;">
                  <thead>
                    <tr style="border-bottom:1px solid var(--border-color); color:var(--text-secondary); font-size:0.75rem; text-transform:uppercase;">
                      <th style="padding:16px 20px; font-weight:600;">Artist</th>
                      <th style="padding:16px 20px; font-weight:600;">Track Overlap</th>
                      <th style="padding:16px 20px; font-weight:600; text-align:right;">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${dashboardData.crossTrack.slice(0, 100).map(a => {
                      const spotifyUrl = a.spotifyId ? \`https://open.spotify.com/artist/\${a.spotifyId}\` : \`https://open.spotify.com/search/\${encodeURIComponent(a.name)}\`;
                      const copyPayload = \`\${a.name}\\n\${spotifyUrl}\`;
                      return \`
                      <tr style="border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                        <td style="padding:16px 20px;">
                          <div style="display:flex; align-items:center; gap:12px;">
                            <div class="artist-image" style="width:40px; height:40px; font-size:1rem;">\${a.name.charAt(0)}</div>
                            <div>
                              <div style="font-weight:700; font-size:1rem;"><a href="\${spotifyUrl}" target="_blank" style="color:white; text-decoration:none; transition:color 0.2s;" onmouseover="this.style.color='var(--spotify-green)'" onmouseout="this.style.color='white'">\${a.name}</a></div>
                              <div style="font-size:0.75rem; color:var(--text-secondary); margin-top:2px;">Curation Match: <span style="color:white; font-weight:500;">\${(window.trackMap && window.trackMap[a.tracks[0]]) ? window.trackMap[a.tracks[0]] : a.tracks[0]}</span></div>
                            </div>
                          </div>
                        </td>
                        <td style="padding:16px 20px;">
                          <div style="display:inline-flex; align-items:center; justify-content:center; background:rgba(29, 185, 84, 0.1); border:1px solid rgba(29, 185, 84, 0.2); padding:4px 12px; border-radius:99px; font-variant-numeric:tabular-nums; color:var(--spotify-green); font-weight:800; font-size:1rem;">
                            \${a.trackCount} Tracks
                          </div>
                        </td>
                        <td style="padding:16px 20px; text-align:right;">
                           <button onclick="copyToClipboard(event, \`\${copyPayload}\`)" class="glass" style="padding:8px 16px; font-size:0.75rem; font-weight:700; color:var(--text-primary); cursor:pointer; background:transparent; transition:all 0.2s;" onmouseover="this.style.background='var(--spotify-green)'; this.style.color='black'; this.style.borderColor='var(--spotify-green)';" onmouseout="this.style.background='transparent'; this.style.color='var(--text-primary)'; this.style.borderColor='var(--border-color)';">Copy for CRM</button>
                        </td>
                      </tr>
                    \`}).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function copyToClipboard(event, text) {
      if (event) event.stopPropagation();
      navigator.clipboard.writeText(text);
      const btn = event ? event.target : null;
      if (btn) {
        const originalText = btn.innerText;
        btn.innerText = '✅ COPIED';
        setTimeout(() => btn.innerText = originalText, 2000);
      }
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
